version: "3.8"
services:
  cyseck:
    container_name: cyseck-app
    image: cyseck:latest
    build: .
    environment:
      - PORT=${PORT:-8503}
      - NODE_ENV=production
    restart: unless-stopped
    init: true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:$${PORT}/api/health || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    ports:
      - "${PORT:-8503}:${PORT:-8503}"
    env_file:
      - backend/.env
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: review_panel_db
    restart: unless-stopped
    env_file:
      - backend/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:

networks:
  default:
    external: true
    name: npm-network
